name: Build release ZIP

on:
  release:
    types: [published]

permissions:
  contents: write # required to upload the release asset

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Compile the blocks into build/blocks/* (block.json auto-discovered from
      # assets/src/blocks). The staged folder below includes this build/ output.
      - name: Build blocks
        run: |
          npm ci
          npm run build

      # Stage into .release/ (NOT build/, which now holds the plugin's compiled
      # block output and must be copied into the package, not excluded).
      - name: Stage plugin into slug-named folder
        run: |
          mkdir -p .release/surecart-eu-helper
          rsync -a --exclude-from='.distignore' \
            --exclude '.release' \
            ./ .release/surecart-eu-helper/

      - name: Create eu-helper.zip
        run: |
          cd .release
          zip -r ../eu-helper.zip surecart-eu-helper

      - name: Attach ZIP to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" eu-helper.zip --clobber
