name: QA Build
# Build an installable plugin ZIP for QA when a PR gets the "qa ready" label
# (or via a manual run). The ZIP is uploaded as a workflow artifact and a
# download link is posted back to the PR. No release is published — this is a
# throwaway build for testers. Releases are handled separately by release.yml.

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write # comment the download link on the PR

# One build per PR/branch; a re-label cancels the previous run.
concurrency:
  group: qa-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  qa-build:
    # Only the "qa ready" label (matches SureCart's label name) or a manual run.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.label.name == 'qa ready' }}
    name: Build ZIP for QA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version + ZIP name
        id: meta
        run: |
          VERSION="$(grep -oiP '^\s*\*\s*Version:\s*\K[0-9][0-9.]*' surecart-eu-helper.php | head -1)"
          [ -n "$VERSION" ] || VERSION="0.0.0"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "zip_name=surecart-eu-helper-v${VERSION}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # Stage into a slug-named folder so the ZIP unpacks to wp-content/plugins/
      # surecart-eu-helper/. Mirrors release.yml so QA tests the same layout.
      - name: Stage plugin
        run: |
          mkdir -p build/surecart-eu-helper
          rsync -a --exclude-from='.distignore' --exclude 'build' ./ build/surecart-eu-helper/

      - name: Create ZIP
        run: |
          cd build
          zip -r "../${{ steps.meta.outputs.zip_name }}.zip" surecart-eu-helper

      - name: Upload artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.zip_name }}
          path: ${{ steps.meta.outputs.zip_name }}.zip
          if-no-files-found: error
          retention-days: 14

      - name: Comment download link on the PR
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const artifactUrl = '${{ steps.upload.outputs.artifact-url }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '## 📦 QA build ready',
              '',
              `**Version:** \`${{ steps.meta.outputs.version }}\` · **Commit:** \`${context.sha.substring(0, 7)}\``,
              '',
              `▶️ **[Download the plugin ZIP](${artifactUrl})** — sign in to GitHub; the \`.zip\` is under **Artifacts** on the [workflow run](${runUrl}).`,
              '',
              'Install on a test site that has **SureCart** active: *Plugins → Add New → Upload Plugin*.',
              '',
              '_Remove and re-add the **qa ready** label to rebuild._',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
